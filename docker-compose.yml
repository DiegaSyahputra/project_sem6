services:
    app:
        build: .
        container_name: project-sem6-app
        working_dir: /var/www
        depends_on:
            - mysql

    nginx:
        image: nginx:latest
        container_name: project-sem6-nginx
        ports:
            - "8000:80"
        volumes:
            - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
        depends_on:
            - app

    mysql:
        image: mysql:8
        container_name: project-sem6-mysql
        restart: unless-stopped
        environment:
            MYSQL_DATABASE: project_sem6
            MYSQL_ROOT_PASSWORD: root
        ports:
            - "3307:3306"
        volumes:
            - mysql_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: project-sem6-phpmyadmin
        restart: unless-stopped
        ports:
            - "8081:80"
        environment:
            PMA_HOST: mysql
            MYSQL_ROOT_PASSWORD: root
        depends_on:
            - mysql

volumes:
    mysql_data:
